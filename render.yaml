# Render Blueprint — USIS CM (Flask API + Gulp static shell + PostgreSQL)
# Dashboard: New > Blueprint > connect GitHub repo > apply this file.
# After first deploy: set SECRET_KEY, TOKEN_ENCRYPTION_KEY, BOOTSTRAP_ADMIN_* in the dashboard,
# then run ``python scripts/create_bootstrap_admin.py`` in the Render Shell.

databases:
  - name: usis-cm-db
    databaseName: usis_cm
    user: usis_app
    plan: basic-256mb

services:
  - type: web
    name: usis-cm
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: >-
      (cd ../W3CRM-v3.0-13_September_2025/gulp && npm ci && npx gulp build) &&
      pip install -r requirements.txt
    preDeployCommand: flask db upgrade
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz
    disk:
      name: usis-instance
      mountPath: /opt/render/project/src/backend/instance
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: FLASK_APP
        value: app:create_app
      - key: FLASK_ENV
        value: production
      - key: USIS_BOOTSTRAP_LEADS_ON_STARTUP
        value: "0"
      - key: USIS_ALLOW_SELF_REGISTER
        value: "1"
      - key: USIS_APP_PUBLIC_URL
        value: https://www.usiscm.com
      - key: USIS_API_DEV_ALLOW_ANY
        value: "0"
      - key: USIS_STATIC_ROOT
        value: ../W3CRM-v3.0-13_September_2025/gulp/dist
      - key: DATABASE_URL
        fromDatabase:
          name: usis-cm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: USIS_AI_ENABLED
        value: "1"
      - key: USIS_XAI_MODEL
        value: grok-4-1-fast
      - key: USIS_XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: USIS_AI_MAX_TOOL_ROUNDS
        value: "8"
      - key: USIS_AI_REQUEST_TIMEOUT_SEC
        value: "120"
      - key: USIS_XAI_API_KEY
        sync: false
