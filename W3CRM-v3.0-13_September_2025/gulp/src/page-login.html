<!DOCTYPE html>
<html lang="en">
<head>
    
	@@include("elements/meta.html", {
		"fileName": "page-login.html",
	})
	
	<!-- Start - Style CSS -->
	<link class="main-plugins" href="assets/css/plugins.css" rel="stylesheet">
	<link class="main-css" href="assets/css/style.css" rel="stylesheet">
	<!-- End - Style CSS -->

</head>
<body>

	<!-- Start - Authentication Wrapper -->
	<div class="auth-wrapper">
		<div class="row justify-content-center align-items-center min-vh-100 py-4">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto">
				<div class="auth-form">
					<div class="text-center mb-4">
						<div class="brand-logo mb-3">
							<img class="usis-login-logo img-fluid" style="max-height:5rem;width:auto;object-fit:contain;"
								src="assets/images/branding/usis-eagle-logo.png"
								alt="US Interior Specialties"
								onerror="this.onerror=null;this.src='assets/images/branding/usis-wordmark.svg'">
						</div>
						<h3 class="mb-0">Sign In</h3>
						<p class="mb-0">Log in to continue your journey!</p>
					</div>
					<form id="usis-login-form" method="post" action="">
						<div class="mb-3">
							<label class="form-label" for="usis-login-email">Email</label>
							<input type="email" class="form-control form-control-lg" id="usis-login-email" name="email" autocomplete="username" required placeholder="hello@example.com">
						</div>
						<div class="mb-3">
							<label class="form-label" for="usis-login-password">Password</label>
							<div class="position-relative">
								<input type="password" id="usis-login-password" name="password" autocomplete="current-password" class="form-control form-control-lg dz-password" required placeholder="Enter your password">
								<span class="show-pass position-absolute top-50 end-0 me-2 translate-middle">
									<span class="show"><i class="fa fa-eye-slash"></i></span>
									<span class="hide"><i class="fa fa-eye"></i></span>
								</span>
							</div>
						</div>
						<div class="d-flex gap-2 flex-wrap justify-content-between mb-4 mb-lg-5">
							<div class="form-check custom-checkbox mb-0">
								<input type="checkbox" class="form-check-input" id="customCheckBox1" name="remember" value="1">
								<label class="form-check-label" for="customCheckBox1">Remember me</label>
							</div>
							<a href="page-forgot-password.html" class="btn-link text-primary">Forgot Password?</a>
						</div>
						<div class="text-center mb-4">
							<button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Sign In</button>
						</div>
						<div class="text-center border-bottom border-grey position-relative my-3">
							<span class="small bg-light position-absolute top-50 start-50 translate-middle px-2 ">Or sign in with</span>
						</div>
						<div id="usis-ms-login-wrap" class="d-none text-center mb-3">
							<a id="usis-ms-login-btn" class="btn btn-outline-dark btn-lg w-100" href="#">
								<i class="fab fa-microsoft me-2"></i>Sign in with Microsoft
							</a>
						</div>
						<div id="usis-login-error-alert" class="alert alert-danger py-2 small d-none" role="alert"></div>
						<p class="text-center small mt-3 mb-0">
							Need an account? <a class="btn-link text-primary" id="usis-login-register-link" href="page-register.html">Create one</a>
						</p>
						<p class="text-center small mt-2 mb-0">
							Applying for a job? <a class="btn-link text-primary" href="apply.html">Start at the careers page</a>
						</p>
						<p class="text-center text-muted small mt-2 mb-0">
							<a class="btn-link text-primary" href="https://www.gousis.com/" target="_blank" rel="noopener">www.gousis.com</a>
						</p>
					</form>
				</div>
			</div>
		</div>
    </div>
	<!-- End - Authentication Wrapper -->

	<!-- Start - Page Scripts -->
	@@include("elements/script.html")
	
	<!-- Script For Custom JS -->
	<script src="assets/js/deznav-init.js"></script>
	<script src="assets/js/custom.js"></script>
	<script>
	(function () {
		function apiBase() {
			if (typeof window.usisApiBase === "function") return window.usisApiBase();
			if (typeof window.USIS_API_BASE === "string") return window.USIS_API_BASE.trim().replace(/\/$/, "");
			return "";
		}
		var LOGIN_ERR = {
			required: "Email and password are required.",
			invalid: "Invalid email or password. On Render, create a user with the bootstrap script or register first."
		};
		var MS_ERR = {
			not_configured: "Microsoft sign-in is not enabled on this server.",
			cancelled: "Microsoft sign-in was cancelled or denied.",
			invalid_state: "Sign-in session expired. Please try Microsoft sign-in again.",
			token: "Microsoft sign-in could not be completed. Try again or use email and password.",
			no_email: "Microsoft did not return an email for this account.",
			domain_denied: "Your email domain is not allowed for Microsoft sign-in.",
			not_registered: "No USIS account exists for this Microsoft identity. Ask an administrator to create your user, or enable JIT provisioning.",
			inactive: "This USIS account is inactive. Contact an administrator."
		};
		function showLoginAlert(code, map) {
			if (!code) return;
			var el = document.getElementById("usis-login-error-alert");
			if (!el) return;
			el.textContent = map[code] || ("Sign-in issue: " + code);
			el.classList.remove("d-none");
		}
		function showLoginError() {
			showLoginAlert(new URLSearchParams(window.location.search).get("login_error"), LOGIN_ERR);
		}
		function showMsError() {
			showLoginAlert(new URLSearchParams(window.location.search).get("ms_error"), MS_ERR);
		}
		var reg = document.getElementById("usis-login-register-link");
		if (reg) {
			var nxt = new URLSearchParams(window.location.search).get("next") || "";
			reg.href = "page-register.html" + (nxt ? "?next=" + encodeURIComponent(nxt) : "");
		}
		fetch(apiBase() + "/api/v1/auth/status", { credentials: "include", headers: { Accept: "application/json" } })
			.then(function (r) { return r.json(); })
			.then(function (body) {
				if (body && body.microsoft_sso_enabled) {
					var w = document.getElementById("usis-ms-login-wrap");
					if (w) w.classList.remove("d-none");
					var b = document.getElementById("usis-ms-login-btn");
					if (b) {
						var next = new URLSearchParams(window.location.search).get("next") || "";
						var href = apiBase() + "/auth/microsoft/start";
						if (next) href += "?next=" + encodeURIComponent(next);
						b.setAttribute("href", href);
					}
				}
				showLoginError();
				showMsError();
			})
			.catch(function () {
				showLoginError();
				showMsError();
			});
	})();
	</script>
</body>
</html>
