<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>{% block title %}Document{% endblock %}</title>
	<style>
		body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; line-height: 1.45; font-size: 11pt; }
		.print-logo-wrap { margin-bottom: 0.75rem; }
		.print-logo { max-height: 3rem; max-width: 14rem; object-fit: contain; }
		.letterhead { border-bottom: 2px solid #0d6efd; padding-bottom: 0.75rem; margin-bottom: 1.25rem; }
		.letterhead h1 { margin: 0; font-size: 1.35rem; font-weight: 700; color: #0d6efd; }
		.letterhead .tag { margin: 0.25rem 0 0; font-size: 0.85rem; color: #555; }
		h2 { font-size: 1.1rem; margin: 1.25rem 0 0.5rem; }
		h2.usis-print-section { break-after: avoid; page-break-after: avoid; }
		table.lines { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 10pt; }
		table.lines thead { display: table-header-group; }
		table.lines th, table.lines td { border: 1px solid #ccc; padding: 0.4rem 0.5rem; text-align: left; }
		table.lines th { background: #f4f6f8; font-weight: 600; }
		table.lines td.num, table.lines th.num { text-align: right; }
		.meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; font-size: 10pt; margin: 1rem 0; }
		.meta dt { font-weight: 600; color: #555; margin: 0; }
		.meta dd { margin: 0 0 0.35rem; }
		.footer-note { margin-top: 2rem; font-size: 9pt; color: #666; border-top: 1px solid #ddd; padding-top: 0.75rem; }
		.no-print { margin-bottom: 1rem; }
		@media print {
			body { margin: 0.5in; }
			a[href]:after { content: ""; }
			.no-print { display: none !important; }
		}
	</style>
	{% block extra_head %}{% endblock %}
</head>
<body>
{% if print_logo_url %}
<div class="print-logo-wrap no-print"><img src="{{ print_logo_url }}" alt="" class="print-logo" /></div>
<div class="print-logo-wrap d-none d-print-block"><img src="{{ print_logo_url }}" alt="" class="print-logo" /></div>
{% endif %}
<div class="no-print">
	<button type="button" class="btn btn-sm btn-primary" onclick="window.print()">Print…</button>
</div>
{% block body %}{% endblock %}
</body>
</html>
