<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Sign in — USIS</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
	<style>
		body { min-height: 100vh; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
		.usis-login-card { max-width: 28rem; border-radius: 0.75rem; }
		.usis-login-logo { max-height: 4.5rem; width: auto; object-fit: contain; }
	</style>
</head>
<body class="d-flex align-items-center py-5">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-5">
				<div class="card shadow-sm usis-login-card mx-auto">
					<div class="card-body p-4 p-md-5">
						<div class="text-center mb-4">
							<img src="{{ logo_remote }}" alt="US Interior Specialties" class="usis-login-logo mb-2"
								onerror="this.onerror=null;this.src='{{ url_for('static', filename='branding/usis-wordmark.svg') }}'">
							<p class="text-muted small mb-0">Sign in to the USIS workspace</p>
						</div>
						{% with messages = get_flashed_messages(with_categories=true) %}
							{% if messages %}
								{% for category, message in messages %}
									<div class="alert alert-{{ category }} py-2 small" role="alert">{{ message }}</div>
								{% endfor %}
							{% endif %}
						{% endwith %}
						<form method="post" action="{{ url_for('auth.login') }}">
							{% if login_next %}
							<input type="hidden" name="next" value="{{ login_next }}">
							{% endif %}
							<div class="mb-3">
								<label class="form-label" for="email">Email</label>
								<input type="email" class="form-control form-control-lg" id="email" name="email" autocomplete="username" required placeholder="you@company.com">
							</div>
							<div class="mb-3">
								<label class="form-label" for="password">Password</label>
								<input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="current-password" required placeholder="Password">
							</div>
							<div class="d-flex justify-content-between align-items-center mb-4">
								<div class="form-check">
									<input class="form-check-input" type="checkbox" name="remember" id="remember" value="1">
									<label class="form-check-label small" for="remember">Remember this device</label>
								</div>
								<a class="small" href="https://www.gousis.com/" target="_blank" rel="noopener">Company site</a>
							</div>
							<button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
						</form>
						<p class="text-center text-muted small mt-4 mb-0">
							<a href="https://www.gousis.com/" target="_blank" rel="noopener">www.gousis.com</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
