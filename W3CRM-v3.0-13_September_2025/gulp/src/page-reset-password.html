<!DOCTYPE html>
<html lang="en">
<head>

	@@include("elements/meta.html", {
		"fileName": "page-reset-password.html",
	})

	<link class="main-plugins" href="assets/css/plugins.css" rel="stylesheet">
	<link class="main-css" href="assets/css/style.css" rel="stylesheet">
	<link href="assets/css/usis-public-apply.css" rel="stylesheet">

</head>
<body class="usis-public-page">

	<div class="auth-wrapper">
		<div class="row justify-content-center align-items-center min-vh-100 py-4">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto">
				<div class="auth-form">
					<div id="usis-reset-done" class="d-none">
						<div class="text-center mb-4">
							<div class="brand-logo mb-3">
								<img class="usis-login-logo img-fluid" style="max-height:5rem;width:auto;object-fit:contain;"
									src="assets/images/branding/usis-eagle-logo.png"
									alt="US Interior Specialties"
									onerror="this.onerror=null;this.src='assets/images/branding/usis-wordmark.svg'">
							</div>
							<h3 class="mb-0">Password updated</h3>
							<p class="mb-0 text-muted">You can sign in with your new password.</p>
						</div>
						<a class="btn btn-primary btn-lg w-100" href="page-login.html">Sign in</a>
					</div>
					<div id="usis-reset-form-wrap">
					<div class="text-center mb-4">
						<div class="brand-logo mb-3">
							<img class="usis-login-logo img-fluid" style="max-height:5rem;width:auto;object-fit:contain;"
								src="assets/images/branding/usis-eagle-logo.png"
								alt="US Interior Specialties"
								onerror="this.onerror=null;this.src='assets/images/branding/usis-wordmark.svg'">
						</div>
						<h3 class="mb-0">Choose a new password</h3>
						<p class="mb-0">Enter a new password for your USIS account.</p>
					</div>
					<form id="usis-reset-form">
						<div id="usis-reset-err" class="alert alert-danger py-2 small d-none" role="alert"></div>
						<div class="mb-3">
							<label class="form-label" for="usis-reset-password">New password</label>
							<input type="password" class="form-control form-control-lg" id="usis-reset-password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
						</div>
						<div class="mb-4">
							<label class="form-label" for="usis-reset-password2">Confirm password</label>
							<input type="password" class="form-control form-control-lg" id="usis-reset-password2" autocomplete="new-password" required minlength="8">
						</div>
						<div class="text-center mb-4">
							<button type="submit" class="btn btn-primary btn-lg w-100" id="usis-reset-submit">Update password</button>
						</div>
						<p class="text-center small mb-0">
							<a class="btn-link text-primary" href="page-forgot-password.html">Request a new reset link</a>
						</p>
					</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	@@include("elements/script-public.html")
	<script>
	(function () {
		function apiBase() {
			if (typeof window.usisApiBase === "function") return window.usisApiBase();
			if (typeof window.USIS_API_BASE === "string") return window.USIS_API_BASE.trim().replace(/\/$/, "");
			return "";
		}
		var params = new URLSearchParams(window.location.search);
		var token = params.get("token") || "";
		var errEl = document.getElementById("usis-reset-err");
		if (!token) {
			if (errEl) {
				errEl.textContent = "Missing reset link. Request a new one from the forgot password page.";
				errEl.classList.remove("d-none");
			}
			var submit = document.getElementById("usis-reset-submit");
			if (submit) submit.disabled = true;
		}
		var form = document.getElementById("usis-reset-form");
		if (!form) return;
		form.addEventListener("submit", function (e) {
			e.preventDefault();
			if (errEl) {
				errEl.classList.add("d-none");
				errEl.textContent = "";
			}
			var p1 = (document.getElementById("usis-reset-password") || {}).value;
			var p2 = (document.getElementById("usis-reset-password2") || {}).value;
			if (p1 !== p2) {
				if (errEl) {
					errEl.textContent = "Passwords do not match.";
					errEl.classList.remove("d-none");
				}
				return;
			}
			var btn = document.getElementById("usis-reset-submit");
			if (btn) btn.disabled = true;
			fetch(apiBase() + "/api/v1/auth/password-reset/confirm", {
				method: "POST",
				credentials: "include",
				headers: { "Content-Type": "application/json", Accept: "application/json" },
				body: JSON.stringify({ token: token, password: p1 }),
			})
				.then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
				.then(function (res) {
					if (!res.ok) throw new Error((res.body && res.body.error) || "Reset failed");
					var done = document.getElementById("usis-reset-done");
					var wrap = document.getElementById("usis-reset-form-wrap");
					if (wrap) wrap.classList.add("d-none");
					if (done) done.classList.remove("d-none");
				})
				.catch(function (ex) {
					if (errEl) {
						errEl.textContent = ex.message || String(ex);
						errEl.classList.remove("d-none");
					}
				})
				.finally(function () {
					if (btn) btn.disabled = false;
				});
		});
	})();
	</script>
</body>
</html>
