	<!-- Flask API root for session login/logout + credentialed ``fetch``.
	     External file avoids CSP ``script-src`` blocking inline scripts when ``default-src 'self'`` (no ``unsafe-inline``).

<body class="usis-public-page">

	<div class="auth-wrapper">
		<div class="row justify-content-center align-items-center min-vh-100 py-4">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto">
				<div class="auth-form">
					<div id="usis-forgot-sent" class="d-none">
						<div class="text-center mb-4">
							<div class="brand-logo mb-3">
								<img class="usis-login-logo img-fluid" style="max-height:5rem;width:auto;object-fit:contain;"
									src="assets/images/branding/usis-eagle-logo.png"
									alt="US Interior Specialties"
									onerror="this.onerror=null;this.src='assets/images/branding/usis-wordmark.svg'">
							</div>
							<h3 class="mb-0">Check your email</h3>
							<p class="mb-0 text-muted">If an account exists for that address, we sent password reset instructions.</p>
						</div>
						<p class="text-muted small mb-4" id="usis-forgot-sent-hint"></p>
						<div class="d-grid gap-2">
							<a class="btn btn-primary btn-lg" href="page-login.html">Back to sign in</a>
							<a class="btn btn-outline-secondary btn-lg" href="apply.html">Careers page</a>
						</div>
					</div>
					<div id="usis-forgot-form-wrap">
					<div class="text-center mb-4">
						<div class="brand-logo mb-3">
							<img class="usis-login-logo img-fluid" style="max-height:5rem;width:auto;object-fit:contain;"
								src="assets/images/branding/usis-eagle-logo.png"
								alt="US Interior Specialties"
								onerror="this.onerror=null;this.src='assets/images/branding/usis-wordmark.svg'">
						</div>
						<h3 class="mb-0">Forgot password</h3>
						<p class="mb-0">Enter your email and we will send a link to reset your password.</p>
					</div>
					<form id="usis-forgot-form">
						<div id="usis-forgot-err" class="alert alert-danger py-2 small d-none" role="alert"></div>
						<div class="mb-4">
							<label class="form-label" for="usis-forgot-email">Email</label>
							<input type="email" class="form-control form-control-lg" id="usis-forgot-email" autocomplete="email" required placeholder="hello@example.com">
						</div>
						<div class="text-center mb-4">
							<button type="submit" class="btn btn-primary btn-lg w-100" id="usis-forgot-submit">Send reset link</button>
						</div>
						<p class="text-center small mb-0">
							<a class="btn-link text-primary" href="page-login.html">Back to sign in</a>
						</p>
						<p class="text-center small mt-2 mb-0">
							<a class="btn-link text-primary" href="apply.html">Applying for a job? Careers page</a>
						</p>
					</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="assets/js/usis-auth-links.js"></script>
	<script src="assets/vendor/jquery/dist/jquery.min.js"></script>
	<script src="assets/js/usis-theme.js"></script>
	<script src="assets/vendor/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

	<script>
	(function () {
		function apiBase() {
			if (typeof window.usisApiBase === "function") return window.usisApiBase();
			if (typeof window.USIS_API_BASE === "string") return window.USIS_API_BASE.trim().replace(/\/$/, "");
			return "";
		}
		var form = document.getElementById("usis-forgot-form");
		if (!form) return;
		form.addEventListener("submit", function (e) {
			e.preventDefault();
			var errEl = document.getElementById("usis-forgot-err");
			if (errEl) {
				errEl.classList.add("d-none");
				errEl.textContent = "";
			}
			var email = (document.getElementById("usis-forgot-email") || {}).value;
			var btn = document.getElementById("usis-forgot-submit");
			if (btn) btn.disabled = true;
			fetch(apiBase() + "/api/v1/auth/password-reset/request", {
				method: "POST",
				credentials: "include",
				headers: { "Content-Type": "application/json", Accept: "application/json" },
				body: JSON.stringify({ email: email }),
			})
				.then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
				.then(function (res) {
					if (!res.ok) throw new Error((res.body && res.body.error) || "Request failed");
					var sent = document.getElementById("usis-forgot-sent");
					var wrap = document.getElementById("usis-forgot-form-wrap");
					if (wrap) wrap.classList.add("d-none");
					if (sent) sent.classList.remove("d-none");
					var hint = document.getElementById("usis-forgot-sent-hint");
					if (hint && res.body && res.body.dry_run) {
						hint.textContent = "Email delivery is not configured on this server yet. Ask your administrator to set MAIL_SERVER, MAIL_USERNAME, MAIL_PASSWORD, and MAIL_FROM.";
					}
				})
				.catch(function (ex) {
					if (errEl) {
						errEl.textContent = ex.message || String(ex);
						errEl.classList.remove("d-none");
					}
				})
				.finally(function () {
					if (btn) btn.disabled = false;
				});
		});
	})();
	</script>
</body>
</html>
